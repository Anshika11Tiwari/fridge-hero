<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fridge Hero</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container {
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
    max-width:500px;
    width:100%;
}

h1 { text-align:center; margin-bottom:10px; }

.tagline {
    text-align:center;
    margin-bottom:30px;
    color:#666;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:14px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.recipe-card {
    margin-top:20px;
    padding:20px;
    background:#f9f9f9;
    border-radius:10px;
    display:none;
}

.error {
    color:red;
    margin-top:10px;
    display:none;
}
</style>
</head>

<body>

<div class="container">
<h1>🍳 Fridge Hero</h1>
<p class="tagline">Turn ingredients into magic ✨</p>

<input id="ingredient1" placeholder="Ingredient 1">
<input id="ingredient2" placeholder="Ingredient 2">
<input id="ingredient3" placeholder="Ingredient 3">

<button id="btn" onclick="generateRecipe()">Cook Magic</button>

<div id="recipeCard" class="recipe-card">
<h2 id="dishName"></h2>
<div id="recipeContent"></div>
</div>

<div id="errorMessage" class="error"></div>
</div>

<script>
async function generateRecipe() {

    const btn = document.getElementById("btn");
    const error = document.getElementById("errorMessage");
    const card = document.getElementById("recipeCard");

    const ing1 = document.getElementById("ingredient1").value.trim();
    const ing2 = document.getElementById("ingredient2").value.trim();
    const ing3 = document.getElementById("ingredient3").value.trim();

    if (!ing1 || !ing2 || !ing3) {
        error.innerText = "Enter all ingredients!";
        error.style.display = "block";
        return;
    }

    error.style.display = "none";
    card.style.display = "none";
    btn.innerText = "Loading...";
    btn.disabled = true;

    try {
        const res = await fetch("/api/cook", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ ing1, ing2, ing3 })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        document.getElementById("dishName").innerText = "🍽️ Your Dish";
        document.getElementById("recipeContent").innerText = data.output;

        card.style.display = "block";

    } catch (err) {
        error.innerText = "Error generating recipe";
        error.style.display = "block";
    }

    btn.innerText = "Cook Magic";
    btn.disabled = false;
}
</script>

</body>
</html>
